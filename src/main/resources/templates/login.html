<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 轻阅读</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/glassmorphism.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            animation: fadeInUp 0.6s ease forwards;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--primary-gradient);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(24, 160, 88, 0.3);
        }

        .login-logo svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group .glass-input {
            padding-left: 44px;
        }

        .form-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(25%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .login-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .login-actions a {
            font-size: 14px;
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .login-actions a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* 装饰性背景元素 */
        .decoration {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .decoration-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(24, 160, 88, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .decoration-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(54, 173, 106, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite reverse;
        }

        .decoration-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 226, 183, 0.12) 0%, transparent 70%);
            top: 50%;
            left: 10%;
            animation: float 18s ease-in-out infinite;
        }

        /* 移动端适配 */
        @media screen and (max-width: 768px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>

    <div class="login-wrapper">
        <div class="login-card glass-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="login-title">轻阅读</h1>
                <p class="login-subtitle">登录您的账号，开始阅读之旅</p>
            </div>

            <form class="login-form layui-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="username" name="username" class="glass-input" placeholder="请输入用户名" required lay-verify="required" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" name="password" class="glass-input" placeholder="请输入密码" required lay-verify="required" autocomplete="current-password">
                </div>

                <div class="login-actions">
                    <a href="/forget">忘记密码？</a>
                </div>

                <button type="submit" lay-submit lay-filter="login" class="glass-btn glass-btn-block">
                    登录
                </button>
            </form>

            <div class="login-footer">
                还没有账号？ <a href="/reg">立即注册</a>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script src="/static/js/ajax.js"></script>
    <script>
        layui.use(['form', 'layer'], function () {
            var $ = layui.jquery;
            var form = layui.form;

            form.on('submit(login)', function (data) {
                var btn = $(data.elem);
                btn.prop('disabled', true).text('登录中...');
                
                ajax("POST", "/admin/login", data.field, function (res) {
                    if (res.isSuccess == true) {
                        location.href = "/admin";
                    } else {
                        layui.layer.msg(res.errorMsg || '登录失败', { icon: 2 });
                        btn.prop('disabled', false).text('登录');
                    }
                }, function () {
                    btn.prop('disabled', false).text('登录');
                });

                return false;
            });
        });
    </script>
</body>
</html>
