<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理</title>
  <link rel="stylesheet" href="/static/layui/css/layui.css">
  <link rel="stylesheet" href="/static/css/glassmorphism.css">
  <style>
    /* 管理后台毛玻璃导航 */
    .admin-nav {
      background: rgba(255, 255, 255, 0.8) !important;
      backdrop-filter: blur(20px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06) !important;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04) !important;
    }

    .admin-nav .layui-nav {
      background: transparent !important;
    }

    .admin-nav .layui-nav .layui-nav-item a {
      color: var(--text-primary) !important;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .admin-nav .layui-nav .layui-nav-item a:hover {
      color: var(--primary-color) !important;
      background: rgba(24, 160, 88, 0.06) !important;
    }

    .admin-nav .layui-nav .layui-this a,
    .admin-nav .layui-nav .layui-nav-item.layui-this a {
      color: var(--primary-color) !important;
      background: rgba(24, 160, 88, 0.1) !important;
    }

    .admin-nav .layui-nav-bar {
      background: var(--primary-color) !important;
      opacity: 1 !important;
    }

    .admin-nav .layui-nav .layui-nav-item a .layui-nav-bar {
      display: none;
    }

    /* 管理后台内容区 */
    .admin-content {
      min-height: calc(100vh - 60px);
      padding: 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e7ed 100%);
    }

    /* 毛玻璃卡片容器 */
    .admin-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* 退出按钮样式 */
    .logout-btn {
      color: var(--text-secondary) !important;
      transition: all 0.2s ease !important;
    }

    .logout-btn:hover {
      color: #e74c3c !important;
      background: rgba(231, 76, 60, 0.08) !important;
    }

    /* 移动端适配 */
    @media screen and (max-width: 768px) {
      .admin-nav .layui-nav {
        padding: 0 5px;
      }
      
      .admin-nav .layui-nav-item {
        margin: 0;
      }
      
      .admin-nav .layui-nav-item a {
        padding: 0 10px !important;
        font-size: 14px;
        height: 50px;
        line-height: 50px;
      }
      
      .admin-nav .layui-nav-item:last-child {
        margin-left: auto;
      }
      
      .admin-nav .layui-nav li {
        margin: 0;
      }

      .admin-content {
        padding: 12px;
      }

      .admin-card {
        padding: 16px;
        border-radius: var(--radius-md);
      }
    }
  </style>
</head>

<body style="width: 100%;height: 100%;background: linear-gradient(135deg, #f5f7fa 0%, #e4e7ed 100%);">
<style>
  .layui-input-block {
    margin-left: 0px;
    min-height: 36px;
  }
</style>

<header class="admin-nav">
  <ul class="layui-nav">
    <li class="layui-nav-item <#if index??>${index}</#if>"><a href="/admin">用户</a></li>
    <li class="layui-nav-item <#if book??>${book}</#if>"><a href="/admin/book">书源</a></li>
    <li class="layui-nav-item <#if rss??>${rss}</#if>"><a href="/admin/rss">订阅源</a></li>
    <li class="layui-nav-item <#if code??>${code}</#if>"><a href="/admin/code">邀请码</a></li>
    <li class="layui-nav-item"><a href="http://app.qread.xyz/admin" target="_blank">app管理</a></li>
    <li class="layui-nav-item" style="float: right;"><a href="/admin/logout" class="logout-btn">退出</a></li>
  </ul>
</header>
