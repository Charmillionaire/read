<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找回密码 - 轻阅读</title>
    <link rel="stylesheet" href="/static/css/glassmorphism.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            padding: 48px 40px;
            animation: fadeInUp 0.6s ease forwards;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--primary-gradient);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(24, 160, 88, 0.3);
        }

        .auth-logo svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-group .glass-input {
            flex: 1;
        }

        .glass-btn-send {
            white-space: nowrap;
            min-width: 120px;
            padding: 14px 20px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .success-message {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .countdown {
            font-size: 13px;
            color: var(--primary-color);
            margin-top: 6px;
            font-weight: 600;
            display: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* 装饰元素 */
        .decoration {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .decoration-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(24, 160, 88, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }

        .decoration-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(54, 173, 106, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite reverse;
        }

        @media screen and (max-width: 768px) {
            .auth-card {
                padding: 36px 24px;
            }

            .auth-title {
                font-size: 24px;
            }

            .glass-btn-send {
                min-width: 100px;
                padding: 14px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="auth-title">找回密码</h1>
                <p class="auth-subtitle">通过邮箱验证，重设您的账号密码</p>
            </div>

            <form class="auth-form" id="reset-form">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" class="glass-input" placeholder="请输入您的注册邮箱" required>
                        <button type="button" id="send-code-btn" class="glass-btn glass-btn-send">发送验证码</button>
                    </div>
                    <div id="email-error" class="error-message"></div>
                    <div id="countdown" class="countdown"></div>
                </div>
                
                <div class="form-group">
                    <label for="code">验证码</label>
                    <input type="text" id="code" name="code" class="glass-input" placeholder="请输入验证码" required>
                    <div id="code-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">新密码</label>
                    <input type="password" id="password" name="password" class="glass-input" placeholder="请输入新密码（至少6个字符）" required>
                    <div id="password-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">确认新密码</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="glass-input" placeholder="请再次输入新密码" required>
                    <div id="confirm-password-error" class="error-message"></div>
                </div>
                
                <button type="submit" id="reset-btn" class="glass-btn glass-btn-block">重置密码</button>
            </form>

            <div class="auth-footer">
                <a href="/">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        let countdownTimer = null;
        let countdownSeconds = 60;
        
        document.getElementById('send-code-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('email-error');
            const sendCodeBtn = document.getElementById('send-code-btn');
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                emailError.textContent = '请输入有效的邮箱地址';
                emailError.style.display = 'block';
                return;
            }
            
            emailError.style.display = 'none';
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';
            
            try {
                const response = await fetch('/sendResetCode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                if (result.isSuccess) {
                    startCountdown();
                } else {
                    emailError.textContent = result.errorMsg || '发送验证码失败';
                    emailError.style.display = 'block';
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            } catch (error) {
                emailError.textContent = '网络错误，请稍后重试';
                emailError.style.display = 'block';
                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            }
        });
        
        function startCountdown() {
            const sendCodeBtn = document.getElementById('send-code-btn');
            const countdownDiv = document.getElementById('countdown');
            
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '已发送';
            
            countdownSeconds = 60;
            countdownDiv.textContent = "验证码已发送，" + countdownSeconds + "秒后可重新发送";
            countdownDiv.style.display = 'block';
            
            if (countdownTimer) clearInterval(countdownTimer);
            
            countdownTimer = setInterval(() => {
                countdownSeconds--;
                countdownDiv.textContent = "验证码已发送，" + countdownSeconds + "秒后可重新发送";
                
                if (countdownSeconds <= 0) {
                    clearInterval(countdownTimer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                    countdownDiv.style.display = 'none';
                }
            }, 1000);
        }
        
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            let isValid = true;
            
            // 验证邮箱
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const emailError = document.getElementById('email-error');
            if (!emailRegex.test(email)) {
                emailError.textContent = '请输入有效的邮箱地址';
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }
            
            // 验证验证码
            const codeError = document.getElementById('code-error');
            if (!code.trim()) {
                codeError.textContent = '请输入验证码';
                codeError.style.display = 'block';
                isValid = false;
            } else {
                codeError.style.display = 'none';
            }
            
            // 验证密码
            const passwordError = document.getElementById('password-error');
            if (password.length < 6) {
                passwordError.textContent = '密码长度不能少于6个字符';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }
            
            // 验证确认密码
            const confirmPasswordError = document.getElementById('confirm-password-error');
            if (password !== confirmPassword) {
                confirmPasswordError.textContent = '两次输入的密码不一致';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else {
                confirmPasswordError.style.display = 'none';
            }
            
            if (!isValid) return;
            
            const resetBtn = document.getElementById('reset-btn');
            resetBtn.disabled = true;
            resetBtn.textContent = '重置中...';
            
            try {
                const response = await fetch('/resetPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, password })
                });
                
                const result = await response.json();
                if (result.isSuccess) {
                    alert('密码重置成功，请使用新密码登录');
                    window.location.href = '/';
                } else {
                    alert(result.errorMsg || '密码重置失败');
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = '重置密码';
            }
        });
    </script>
</body>
</html>
